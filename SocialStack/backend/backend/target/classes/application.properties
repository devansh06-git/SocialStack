# ============================================================
#  SocialStack – Spring Boot Configuration
# ============================================================

# Server
server.port=8080

# ── MySQL ──────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/socialstack_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ── JWT ────────────────────────────────────────────────────
# IMPORTANT: Replace with a strong 256-bit Base64-encoded secret in production
app.jwt.secret=U29jaWFsU3RhY2tTZWNyZXRLZXlGb3JKV1QyMDI2U29jaWFsU3RhY2s=
app.jwt.expiration-ms=86400000

# ── CORS ───────────────────────────────────────────────────
# Allows the HTML frontend (file:// or localhost) to talk to the backend
app.cors.allowed-origins=*
